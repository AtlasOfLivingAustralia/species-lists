# This docker-compose file is used to run Elasticsearch and MongoDB for local development.
# It was copied from src/main/docker/docker-compose.yml in the spring boot project root. 
# Any changes should be reflected in both files.
version: '3.7'
services:
  app:
    image: mcr.microsoft.com/devcontainers/java:1-21-bookworm
    user: vscode
    volumes:
      - .:/workspace:cached
    command: sleep infinity
    depends_on:
      - mongodb
      - elasticsearch
    ports:
      - "8080:8080" 
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.26-arm64
    container_name: species-lists-elastic
    environment:
      - node.name=elasticsearch
      - xpack.security.enabled=false
      - discovery.type=single-node
      - ingest.geoip.downloader.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    cap_add:
      - IPC_LOCK
    volumes:
      - ${HOME}/dev/species-lists/elastic:/usr/share/elasticsearch/data
    restart: on-failure
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://elasticsearch:9200"]
      interval: 30s
      timeout: 10s
      retries: 5
  mongodb:
    image: mongo:6.0
    container_name: species-lists-mongo
    restart: on-failure
    ports:
      - "27017:27017"
    volumes:
      - ${HOME}/dev/species-lists/mongo/db:/data/db
volumes:
  mongodb_data_container:
  elasticsearch-data:
    driver: local