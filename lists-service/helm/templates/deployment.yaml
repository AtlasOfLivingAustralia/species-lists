apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ala-species-lists.fullname" . }}
  labels:
    {{ include "ala-species-lists.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{ include "ala-species-lists.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{ include "ala-species-lists.selectorLabels" . | nindent 8 }}
      annotations:
        {{ include "ala-species-lists.deploymentAnnotations" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      initContainers:
        - name: truststore-builder
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              # Locate the system cacerts
              if [ -f /etc/ssl/certs/java/cacerts ]; then
                CACERTS=/etc/ssl/certs/java/cacerts
              elif [ -f $JAVA_HOME/lib/security/cacerts ]; then
                CACERTS=$JAVA_HOME/lib/security/cacerts
              else
                # Fallback search
                CACERTS=$(find /usr/lib/jvm -name cacerts -print -quit)
              fi

              if [ -z "$CACERTS" ]; then
                echo "Could not find system cacerts"
                exit 1
              fi

              echo "Using system truststore: $CACERTS"
              
              # Copy system cacerts to writable volume
              cp "$CACERTS" /truststore/cacerts
              chmod 664 /truststore/cacerts
              
              # Merge the custom truststore (containing AWS certs etc) into the system one
              if [ -f /data/lists-service/config/lists-service-truststore.jks ]; then
                echo "Importing custom truststore..."
                keytool -importkeystore \
                  -srckeystore /data/lists-service/config/lists-service-truststore.jks \
                  -srcstorepass changeme \
                  -destkeystore /truststore/cacerts \
                  -deststorepass changeit \
                  -noprompt
              else
                echo "No custom truststore found, using system truststore only."
              fi
          volumeMounts:
            - name: shared-truststore
              mountPath: /truststore
            - name: config-volume
              mountPath: /data/lists-service/config/lists-service-truststore.jks
              subPath: lists-service-truststore.jks
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          resources:
            {{ toYaml .Values.resources | nindent 12 }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
              scheme: {{ .Values.livenessProbe.httpGet.scheme }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.httpGet.path }}
              port: {{ .Values.startupProbe.httpGet.port }}
              scheme: {{ .Values.startupProbe.httpGet.scheme }}
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            successThreshold: {{ .Values.startupProbe.successThreshold }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
              scheme: {{ .Values.readinessProbe.httpGet.scheme }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            successThreshold: {{ .Values.readinessProbe.successThreshold }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms3500m -Xmx3500m"
          {{- if .Values.env }}
          {{- toYaml .Values.env | nindent 2 }}
          {{- end }}
          command: [ "java" ]
          args:
            - "-Xms3500m"
            - "-Xmx3500m"
            - "-XX:+UseG1GC"
            - "-XX:MaxGCPauseMillis=200"
            - "-XX:G1HeapRegionSize=16m"
            - "-XX:InitiatingHeapOccupancyPercent=45"
            - "-XX:+ParallelRefProcEnabled"
            - "-XX:ConcGCThreads=2"
            - "-XX:+UseContainerSupport"
            - "-Xlog:gc*:file=/tmp/gc.log:time,uptime,level,tags"
            - "-Djavax.net.ssl.trustStore=/truststore/cacerts"
            - "-Djavax.net.ssl.trustStorePassword=changeit"
            - "-Djavax.net.ssl.trustStoreType=jks"
            - "-jar"
            - "app.jar"
            - "--spring.config.location=file:/data/lists-service/config/lists-service-config.properties"
          volumeMounts:
            - name: shared-truststore
              mountPath: /truststore
            - name: config-volume
              mountPath: /data/lists-service/config/lists-service-config.properties
              subPath: lists-service-config.properties
            - name: config-volume
              mountPath: /data/lists-service/config/constraints.json
              subPath: constraints.json
            - name: config-volume
              mountPath: /data/lists-service/config/lists-service-truststore.jks
              subPath: lists-service-truststore.jks
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "ala-species-lists.fullname" . }}
        - name: shared-truststore
          emptyDir: {}